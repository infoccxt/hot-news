name: hot-news-collector

on:
  schedule:
    - cron: "*/20 * * * *"   # 每 20 分钟云端采集一次（无需本机）。改过 cron 值以重新注册 GitHub 调度器
  workflow_dispatch:

# 串行：防止两个 run 同时基于旧 main 提交导致 push 冲突（non-fast-forward）
concurrency:
  group: hot-news-collect
  cancel-in-progress: false

# 内置 GITHUB_TOKEN 用于提交 data.json；无需任何 Cloudflare 凭证。
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # 摘要模型：日日新(SenseNova) 优先；无 key 时回退 GLM（见 collector._glm_creds）
      SENSENOVA_API_KEY: ${{ secrets.SENSENOVA_API_KEY }}
      SENSENOVA_BASE_URL: https://token.sensenova.cn/v1
      SKIP_FETCH_BODY: "1"   # 云端美国节点抓国内源慢，跳过正文抓取，只做标题背景兜底（更快更稳）
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖（fetch_extract 抓正文用 requests）
        run: python -m pip install --quiet requests

      - name: 采集热闻并生成摘要
        run: python collector.py

      - name: 提交 data.json（含增量缓存）
        run: |
          # 先拉取远端最新（并发/外部提交时避免 non-fast-forward 冲突）
          git pull --rebase origin main || true
          git add data.json cache/summaries.json
          git -c user.name="hotnews-bot" -c user.email="bot@infoccxt.local" \
            commit -m "auto: 定时采集 $(date +'%Y-%m-%d %H:%M %Z')" || echo "no changes"
          git push

      - name: 上传 data.json 到 OSS 主源（anything-toy-260717，需 RAM 授权）
        continue-on-error: true   # 授权未到位时失败但不打断 Pages 兜底主链路
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
          OSS_BUCKET: anything-toy-260717
          OSS_REGION: oss-cn-beijing
          OSS_KEY: hotnews/data.json
        run: |
          python -m pip install --quiet oss2
          python - <<'PY'
          import os, oss2
          auth = oss2.Auth(os.environ["OSS_KEY_ID"], os.environ["OSS_KEY_SECRET"])
          b = oss2.Bucket(auth,
                          f'https://{os.environ["OSS_REGION"]}.aliyuncs.com',
                          os.environ["OSS_BUCKET"])
          # 设置跨域（浏览器从 workers.dev 读对象需要）；幂等，失败仅告警
          try:
              from oss2.models import CorsRule, BucketCors
              rule = CorsRule(allowed_origins=["*"], allowed_methods=["GET"],
                              allowed_headers=["*"], max_age_seconds=300)
              b.put_bucket_cors(BucketCors([rule]))
              print("cors set")
          except Exception as e:
              print("cors warn:", e)
          # 上传 data.json 并设为公开读（浏览器可直读）
          b.put_object_from_file(
              os.environ["OSS_KEY"], "data.json",
              headers={
                  "Content-Type": "application/json; charset=utf-8",
                  "Cache-Control": "no-cache",
              })
          b.put_object_acl(os.environ["OSS_KEY"], oss2.BUCKET_ACL_PUBLIC_READ)
          print("uploaded", os.environ["OSS_KEY"], "-> public-read")
          PY
