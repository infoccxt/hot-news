name: HotNews Collector

on:
  schedule:
    - cron: "*/30 * * * *"   # 云端定时采集（不再依赖本机 launchd）
  workflow_dispatch:

permissions:
  contents: write  # 允许提交 data.json / 缓存 回仓库

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      SENSENOVA_API_KEY: ${{ secrets.SENSENOVA_API_KEY }}
      SENSENOVA_BASE_URL: ${{ secrets.SENSENOVA_BASE_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install urllib3 trafilatura requests

      - name: Run collector (fetch article + SenseNova summary)
        run: python collector.py

      - name: Setup wrangler
        run: npm install -g wrangler

      - name: Push data to Cloudflare KV (Worker 请求时读取，免重部署)
        run: wrangler kv key put "data.json" --remote --namespace-id 96e43b25406048c3ae5547423f7b7538 --path data.json

      - name: Deploy Worker (代码/绑定变更时生效，幂等)
        run: wrangler deploy

      - name: Commit data.json and summary cache back to repo (jsDelivr 兜底)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json public/data.json cache/summaries.json
          if git diff --cached --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "chore: auto-update hot news data + summary cache [skip ci]"
            git push
          fi
